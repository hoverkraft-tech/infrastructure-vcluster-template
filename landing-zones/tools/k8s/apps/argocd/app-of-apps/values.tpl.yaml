applications:
  app-of-the-apps:
    namespace: argocd
    additionalLabels: {}
    additionalAnnotations:
      "notifications.argoproj.io/subscribe.on-sync-operation-change.slack": "infra"
      "helm.sh/resource-policy": keep
    finalizers:
    - resources-finalizer.argocd.argoproj.io
    project: default
    source:
      repoURL: '${ repo_url }'
      targetRevision: HEAD
      path: appsets
      directory:
        recurse: true
    destination:
      server: https://kubernetes.default.svc
      namespace: argocd
    syncPolicy:
      automated:
        prune: false
        selfHeal: false
