name: tools
tags:
  managed_by: terraform

vcluster:
  version: "0.34.0"
  loadBalancerIp: "192.168.200.100"
  storageClass: "local-path"
  sts:
    memory:
      request: "123Mi"
      limit: "456Mi"

argocd:
  source_of_truth:
    type: git
    url: git@github.com:<your-org>/argocd-app-of-apps.git

helm:
  argocd:
    repository: oci://ghcr.io/argoproj/argo-helm/argo-cd
    chart_version: 9.7.0
    namespace: argocd
    argocd_app_version: 2.0.5

password_store:
  argocd_admin_password_path: argocd/admin/password   # checkov:skip=CKV_SECRET_6: this is a password path not a password
  argocd_ssh_private_key_path: argocd/ssh/private-key # checkov:skip=CKV_SECRET_6: this is a private key path not a private key
