name: tools
tags:
  managed_by: terraform

vcluster:
  version: "0.34.0"
  loadBalancerIp: "192.168.200.100"
  storageClass: "local-path"
  sts:
    memory:
      request: "800Mi"
      limit: "800Mi"

helm:
  argocd:
    repository: oci://ghcr.io/argoproj/argo-helm
    chart_version: 9.7.0
    namespace: argocd
  argocd-apps:
    repository: oci://ghcr.io/argoproj/argo-helm
    chart_version: 2.0.5
    source-of-truth:
      type: git
      url: git@github.com:<your-org>/argocd-app-of-apps.git


password_store:
  argocd_ssh_private_key_path: argocd/ssh/private-key # checkov:skip=CKV_SECRET_6: this is a private key path not a private key
